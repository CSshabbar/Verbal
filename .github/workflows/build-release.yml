name: Build & Release

on:
  push:
    tags:
      - 'v*'          # triggered by pushing a tag like v1.0.0
  workflow_dispatch:   # or manually from GitHub UI
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true
        default: '1.0.0'

jobs:
  # ── Windows Build ──────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow
          pip install -r whisperflow/requirements.txt
          pip install pyinstaller

      - name: Convert icon to ICO
        run: |
          cd whisperflow
          python -c "from PIL import Image; img=Image.open('assets/icon.png'); img.save('assets/icon.ico', format='ICO', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])"

      - name: Build Windows EXE
        run: |
          cd whisperflow
          pyinstaller verbal-win.spec --clean --noconfirm

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Verbal-Windows
          path: whisperflow/dist/Verbal.exe

  # ── Mac Build ──────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<75" wheel
          pip install -r whisperflow/requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: |
          cd whisperflow
          python3 scripts/generate_icons.py
          mkdir -p assets/icon.iconset
          sips -z 16 16 assets/icon.png --out assets/icon.iconset/icon_16x16.png
          sips -z 32 32 assets/icon.png --out assets/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 assets/icon.png --out assets/icon.iconset/icon_32x32.png
          sips -z 64 64 assets/icon.png --out assets/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 assets/icon.png --out assets/icon.iconset/icon_128x128.png
          sips -z 256 256 assets/icon.png --out assets/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 assets/icon.png --out assets/icon.iconset/icon_256x256.png
          sips -z 512 512 assets/icon.png --out assets/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 assets/icon.png --out assets/icon.iconset/icon_512x512.png
          iconutil -c icns assets/icon.iconset -o assets/Verbal.icns

      - name: Build Mac .app
        run: |
          cd whisperflow
          pyinstaller whisperflow.spec --clean --noconfirm

      - name: Create DMG
        run: |
          cd whisperflow
          hdiutil create -volname "Verbal" -srcfolder dist/Verbal.app -ov dist/Verbal.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Verbal-Mac
          path: whisperflow/dist/Verbal.dmg

  # ── Upload to Supabase & Register Version ──────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Verbal-Windows
          path: dist/

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: Verbal-Mac
          path: dist/

      - name: Compute hashes
        id: hashes
        run: |
          WIN_HASH=$(sha256sum dist/Verbal.exe | cut -d' ' -f1)
          WIN_SIZE=$(stat -c%s dist/Verbal.exe)
          MAC_HASH=$(sha256sum dist/Verbal.dmg | cut -d' ' -f1)
          MAC_SIZE=$(stat -c%s dist/Verbal.dmg)
          echo "win_hash=$WIN_HASH" >> $GITHUB_OUTPUT
          echo "win_size=$WIN_SIZE" >> $GITHUB_OUTPUT
          echo "mac_hash=$MAC_HASH" >> $GITHUB_OUTPUT
          echo "mac_size=$MAC_SIZE" >> $GITHUB_OUTPUT

      - name: Upload Windows build to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST \
            "${SUPABASE_URL}/storage/v1/object/releases/win/Verbal-${{ steps.version.outputs.version }}-setup.exe" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary "@dist/Verbal.exe"

      - name: Upload Mac build to Supabase Storage
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST \
            "${SUPABASE_URL}/storage/v1/object/releases/mac/Verbal-${{ steps.version.outputs.version }}.dmg" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/octet-stream" \
            -H "x-upsert: true" \
            --data-binary "@dist/Verbal.dmg"

      - name: Register Windows version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST \
            "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal,resolution=merge-duplicates" \
            -d "{
              \"platform\": \"win\",
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"changelog\": \"Release ${{ steps.version.outputs.version }}\",
              \"file_url\": \"${SUPABASE_URL}/storage/v1/object/public/releases/win/Verbal-${{ steps.version.outputs.version }}-setup.exe\",
              \"file_hash\": \"${{ steps.hashes.outputs.win_hash }}\",
              \"file_size\": ${{ steps.hashes.outputs.win_size }}
            }"

      - name: Register Mac version
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          curl -s -X POST \
            "${SUPABASE_URL}/rest/v1/app_versions" \
            -H "apikey: ${SUPABASE_SERVICE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal,resolution=merge-duplicates" \
            -d "{
              \"platform\": \"mac\",
              \"version\": \"${{ steps.version.outputs.version }}\",
              \"changelog\": \"Release ${{ steps.version.outputs.version }}\",
              \"file_url\": \"${SUPABASE_URL}/storage/v1/object/public/releases/mac/Verbal-${{ steps.version.outputs.version }}.dmg\",
              \"file_hash\": \"${{ steps.hashes.outputs.mac_hash }}\",
              \"file_size\": ${{ steps.hashes.outputs.mac_size }}
            }"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            dist/Verbal.exe
            dist/Verbal.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
