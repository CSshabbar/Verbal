name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools<75" wheel
          pip install -r whisperflow/requirements.txt
          pip install pyinstaller

      - name: Build Verbal.exe
        shell: pwsh
        run: |
          cd whisperflow
          pyinstaller verbal-win.spec --clean --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y
          $env:PATH += ";C:\Program Files (x86)\Inno Setup 6"

      - name: Build Installer
        shell: pwsh
        run: |
          cd whisperflow
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" verbal-setup.iss

      - name: Upload Windows EXE
        uses: actions/upload-artifact@v4
        with:
          name: Verbal-Windows-EXE
          path: whisperflow/dist/Verbal.exe
          if-no-files-found: error

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: Verbal-Windows-Installer
          path: whisperflow/dist/VerbalSetup.exe
          if-no-files-found: error
